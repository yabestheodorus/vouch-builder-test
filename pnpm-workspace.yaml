packages:
  - "apps/*"
  - "packages/*"

# Native/postinstall build scripts pnpm is allowed to run. This pnpm version
# uses the boolean `allowBuilds` map for approval; set each to true explicitly.
allowBuilds:
  better-sqlite3: true
  prisma: true
  "@prisma/client": true
  "@prisma/engines": true
  esbuild: true
  sharp: true
  unrs-resolver: true
